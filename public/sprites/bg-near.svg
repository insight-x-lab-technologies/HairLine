<?xml version="1.0" encoding="UTF-8"?>
<!--
  Fundo "Polido" (P10-11) — camada PRÓXIMA: estrelas maiores/mais brilhantes,
  esparsas, com leve glow. Padrão 80×80 (tiling sem emenda em 720×1280). Mais
  rápida que `bg-far` (parallax). Contraste contido para não competir com balas.
  Placeholder; slot `spr-bg-near`.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1280" viewBox="0 0 720 1280">
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#a7ecff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a7ecff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="near" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="40" cy="40" r="6" fill="url(#g)"/>
      <circle cx="40" cy="40" r="1.6" fill="#ffffff" opacity="0.95"/>
      <circle cx="10" cy="66" r="1.2" fill="#d8f6ff" opacity="0.7"/>
    </pattern>
  </defs>
  <rect width="720" height="1280" fill="url(#near)"/>
</svg>
